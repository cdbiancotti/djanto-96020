{% extends "base.html" %}

{% block title_head %}Borrar Tarea{% endblock title_head %} 

{% block h1_header %}Borrar Tarea{% endblock h1_header %}
{% block contenido %}
<form action="{% url "tareas:borrar_tarea" tarea.id %}" method="post">
    {% csrf_token %}
    <p>¿Está seguro que desea borrar la tarea {{tarea}}?</p>

    <input type="submit" value="Borrar">
</form>
{% endblock contenido %}
