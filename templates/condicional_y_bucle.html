<h1>Condicional y Bucle</h1>
<p>En este ejemplo, se muestra cómo usar condicionales y bucles en una plantilla de Django.</p>

<ul>
    {% for dato in datos %}
        {% if dato|divisibleby:2 %}
        <li style='color: blue'>
        {% else %}
        <li style='color: red'>
        {% endif %}
            {{ dato }}
        </li>
    {% endfor %}
</ul>
